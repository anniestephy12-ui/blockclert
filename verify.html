<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Certificate Verification</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h1>Blockchain Certificate Verification</h1>

<div class="card">

<input
type="text"
id="studentName"
placeholder="Enter Student Name">

<input
type="text"
id="certificateID"
placeholder="Enter Certificate ID">

<button onclick="verifyCertificate()">
Verify Certificate
</button>

<div id="result"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
